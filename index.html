<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Assistant</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f172a;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== APP ===== */

        .app {
            display: flex;
            height: 100vh;
        }

        /* ===== SIDEBAR ===== */

        .sidebar {
            width: 280px;
            background: #020617;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .logo {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
            color: #38bdf8;
        }

        .new-chat {
            margin: 15px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #0ea5e9;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .new-chat:hover {
            background: #0284c7;
        }

        .sidebar-title {
            padding: 15px;
            color: #94a3b8;
            font-size: 14px;
        }

        .folder-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .folder {
            background: #111827;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .folder-name {
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .file {
            background: #1e293b;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
            color: #cbd5e1;
            font-size: 13px;
        }

        /* ===== MAIN ===== */

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */

        .header {
            height: 70px;
            background: #111827;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            color: white;
            font-size: 18px;
        }

        /* ===== CHAT ===== */

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #0f172a;
        }

        /* ===== MESSAGES ===== */

        .message {
            max-width: 75%;
            padding: 18px;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: #0ea5e9;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #1e293b;
            color: white;
        }

        /* ===== IMAGE PREVIEW ===== */

        .preview-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .preview-image {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #334155;
        }

        /* ===== INPUT ===== */

        .input-area {
            background: #111827;
            border-top: 1px solid #1e293b;
            padding: 20px;
        }

        .input-container {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .input-row input::placeholder {
            color: #94a3b8;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .left-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn:hover {
            background: #475569;
        }

        .send-btn {
            background: #0ea5e9;
        }

        .send-btn:hover {
            background: #0284c7;
        }

        /* ===== ANIMATION ===== */

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* ===== SCROLL ===== */

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        /* ===== MOBILE ===== */

        @media(max-width:900px) {

            .sidebar {
                display: none;
            }

            .message {
                max-width: 95%;
            }

        }
    </style>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="logo">
                🤖 AI Assistant
            </div>

            <button class="new-chat">
                + Nuevo Chat
            </button>

            <div class="sidebar-title">
                Carpetas
            </div>

            <div class="folder-list" id="folderList">

                <div class="folder">

                    <div class="folder-name">
                        📁 Proyecto IA
                    </div>

                    <div class="file">
                        imagen1.png
                    </div>

                    <div class="file">
                        documento.pdf
                    </div>

                </div>

            </div>

        </div>

        <!-- MAIN -->

        <div class="main">

            <!-- HEADER -->

            <div class="header">

                <div class="header-title">
                    Chat Inteligente
                </div>

                <div class="header-icons">
                    <i class="fa-solid fa-gear"></i>
                    <i class="fa-solid fa-user"></i>
                </div>

            </div>

            <!-- CHAT -->

            <div class="chat-box" id="chatBox">

                <div class="message bot">
                    👋 Hola, soy tu IA avanzada. Pregúntame lo que quieras.
                </div>

            </div>

            <!-- INPUT -->

            <div class="input-area">

                <div class="input-container">

                    <!-- PREVIEW -->

                    <div id="previewContainer" class="preview-container"></div>

                    <!-- INPUT -->

                    <div class="input-row">

                        <input type="text" id="messageInput" placeholder="Escribe un mensaje...">

                    </div>

                    <!-- BUTTONS -->

                    <div class="buttons">

                        <div class="left-buttons">

                            <!-- IMAGE -->

                            <button class="btn" onclick="document.getElementById('imageInput').click()">

                                <i class="fa-solid fa-image"></i>

                            </button>

                            <!-- FOLDER -->

                            <button class="btn" onclick="createFolder()">

                                <i class="fa-solid fa-folder-plus"></i>

                            </button>

                            <!-- FILE -->

                            <button class="btn" onclick="document.getElementById('fileInput').click()">

                                <i class="fa-solid fa-paperclip"></i>

                            </button>

                        </div>

                        <!-- SEND -->

                        <button class="btn send-btn" onclick="sendMessage()">

                            <i class="fa-solid fa-paper-plane"></i>

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- INPUTS HIDDEN -->

    <input type="file" id="imageInput" accept="image/*" multiple hidden>

    <input type="file" id="fileInput" multiple hidden>

    <script>

        const API_URL = "http://127.0.0.1:8000/ai-chat";

        const chatBox =
            document.getElementById("chatBox");

        const previewContainer =
            document.getElementById("previewContainer");

        /* ===== IMAGE PREVIEW ===== */

        document
            .getElementById("imageInput")
            .addEventListener("change", function () {

                previewContainer.innerHTML = "";

                const files = this.files;

                for (let file of files) {

                    const reader = new FileReader();

                    reader.onload = function (e) {

                        const img =
                            document.createElement("img");

                        img.src = e.target.result;

                        img.className = "preview-image";

                        previewContainer.appendChild(img);

                    }

                    reader.readAsDataURL(file);

                }

            });

        /* ===== SEND MESSAGE ===== */

        async function sendMessage() {

            const input =
                document.getElementById("messageInput");

            const message = input.value.trim();

            if (message === "") return;

            addMessage(message, "user");

            input.value = "";

            // MENSAJE TEMPORAL

            const typing =
                document.createElement("div");

            typing.className = "message bot";

            typing.id = "typingMessage";

            typing.innerHTML = "⏳ Pensando...";

            chatBox.appendChild(typing);

            chatBox.scrollTop =
                chatBox.scrollHeight;

            try {

                const response =
                    await fetch(API_URL, {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            message: message
                        })

                    });

                const data =
                    await response.json();

                // ELIMINAR PENSANDO

                document
                    .getElementById("typingMessage")
                    .remove();

                let respuesta = "";

                if (data.response) {

                    respuesta = data.response;

                } else if (data.answer) {

                    respuesta = data.answer;

                } else if (data.message) {

                    respuesta = data.message;

                } else {

                    respuesta =
                        JSON.stringify(data);

                }

                addMessage(respuesta, "bot");

            } catch (error) {

                document
                    .getElementById("typingMessage")
                    .remove();

                addMessage(
                    "❌ Error conectando con la IA",
                    "bot"
                );

                console.error(error);

            }

        }

        /* ===== ADD MESSAGE ===== */

        function addMessage(text, sender) {

            const div =
                document.createElement("div");

            div.className =
                `message ${sender}`;

            div.innerHTML = text;

            chatBox.appendChild(div);

            chatBox.scrollTop =
                chatBox.scrollHeight;

        }

        /* ===== ENTER ===== */

        document
            .getElementById("messageInput")
            .addEventListener("keypress", function (e) {

                if (e.key === "Enter") {

                    sendMessage();

                }

            });

        /* ===== CREATE FOLDER ===== */

        function createFolder() {

            const folderName =
                prompt("Nombre de la carpeta:");

            if (!folderName) return;

            const folder =
                document.createElement("div");

            folder.className = "folder";

            folder.innerHTML = `

        <div class="folder-name">
            📁 ${folderName}
        </div>

    `;

            document
                .getElementById("folderList")
                .prepend(folder);

        }

        /* ===== FILES ===== */

        document
            .getElementById("fileInput")
            .addEventListener("change", function () {

                const files = this.files;

                if (files.length === 0) return;

                alert(
                    files.length +
                    " archivo(s) seleccionados"
                );

            });

    </script>

</body>

</html>
